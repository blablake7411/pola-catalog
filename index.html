<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLA 商品目錄</title>
  <meta name="description" content="POLA 台灣正品商品目錄，點擊查看完整商品資訊">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <img src="assets/logo.png" alt="POLA" class="logo-img">
        <span class="tagline">Science. Art. Love.</span>
      </div>
      <a href="https://lin.ee/qxRpzSj" target="_blank" rel="noopener" class="line-header-btn" aria-label="LINE 聯絡業務">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.105.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
        </svg>
      </a>
    </div>
  </header>

  <nav class="category-nav">
    <div class="category-tabs">
      <button class="tab active" data-cat="臉部保養">臉部保養</button>
      <button class="tab" data-cat="彩妝">彩妝</button>
      <button class="tab" data-cat="身體保養">身體保養</button>
      <button class="tab" data-cat="頭髮護理">頭髮護理</button>
    </div>
  </nav>

  <div class="series-bar" id="seriesBar"></div>

  <main class="product-grid" id="productGrid"></main>

  <!-- Cart FAB -->
  <button class="cart-fab" id="cartFab" onclick="toggleCart()" aria-label="收藏清單">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span class="cart-fab-count hidden" id="cartCount">0</span>
  </button>

  <!-- Cart Overlay + Panel -->
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>收藏清單</h2>
      <button class="cart-close" onclick="closeCart()">&times;</button>
    </div>
    <div class="cart-agent-bar" id="cartAgentBar" style="display:none"></div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">尚未加入任何商品</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-totals">
        <div class="cart-total-row">
          <span>原價小計</span>
          <span id="cartSubtotal"></span>
        </div>
        <div class="cart-total-row" id="cartDiscountRow" style="display:none">
          <span>折扣</span>
          <span id="cartDiscount" style="color:#e53e3e"></span>
        </div>
        <div class="cart-total-row final">
          <span>合計</span>
          <span id="cartTotal"></span>
        </div>
      </div>
      <button class="cart-checkout-btn" onclick="openCheckout()">填寫訂購資料</button>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="checkout-overlay" id="checkoutOverlay" style="display:none">
    <div class="checkout-panel" id="checkoutPanel">
      <div id="checkoutForm">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h2 style="margin:0">填寫訂購資料</h2>
          <button onclick="closeCheckout()" style="background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1">&times;</button>
        </div>
        <div class="checkout-field">
          <label>姓名 *</label>
          <input id="co-name" type="text" placeholder="請輸入您的姓名">
        </div>
        <div class="checkout-field">
          <label>電話</label>
          <input id="co-phone" type="tel" placeholder="手機號碼">
        </div>
        <div class="checkout-field">
          <label>寄送地址</label>
          <input id="co-address" type="text" placeholder="收件地址（若面交可不填）">
        </div>
        <div class="checkout-field">
          <label>付款方式</label>
          <select id="co-payment">
            <option value="匯款">匯款</option>
            <option value="現金">現金</option>
            <option value="Line Pay">Line Pay</option>
          </select>
        </div>
        <div class="checkout-field">
          <label>備註</label>
          <textarea id="co-notes" rows="2" placeholder="特殊需求或備注"></textarea>
        </div>
        <button class="checkout-submit" id="checkoutSubmitBtn" onclick="submitOrder()">送出訂單</button>
      </div>
      <div id="checkoutSuccess" class="order-success" style="display:none">
        <div class="checkmark">✓</div>
        <h3>訂單送出成功！</h3>
        <p id="successOrderNum" style="font-weight:700;font-size:15px;margin:8px 0"></p>
        <p>業務會盡快與您確認訂單</p>
        <button onclick="closeCheckout()" style="margin-top:20px;background:#111;color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer">
          繼續瀏覽
        </button>
      </div>
    </div>
  </div>

  <a href="https://lin.ee/qxRpzSj" target="_blank" rel="noopener" class="line-fab" aria-label="LINE 聯絡業務">
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.105.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
    </svg>
  </a>

  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到頂端">↑</button>

  <footer>
    <p>© 2026 POLA 台灣 &nbsp;·&nbsp; 所有商品均為官方正品</p>
    <p style="margin-top:8px;font-size:10px;color:#bbb">
      <a href="admin.html" style="color:#999;text-decoration:none">管理後台</a>
      &nbsp;·&nbsp;
      <a href="agent.html" style="color:#999;text-decoration:none">業務後台</a>
      &nbsp;·&nbsp;
      <a href="API.md" style="color:#999;text-decoration:none">API 規格</a>
    </p>
  </footer>

  <script src="products.js"></script>
  <script src="app.js"></script>
</body>
</html>

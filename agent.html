<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLA · 業務後台</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
    background: #fafafa; color: #111; min-height: 100vh; font-size: 14px;
  }
  .mono { font-family: 'SF Mono', Menlo, Consolas, monospace; }

  /* Top bar */
  .topbar {
    background: #111; color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand .logo-img { height: 22px; width: auto; display: block; filter: invert(1); }
  .brand .sub { font-size: 10px; letter-spacing: 2px; color: #888; }
  .topbar-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: #aaa; }
  .topbar-right select {
    background: #222; color: #fff; border: 1px solid #333; border-radius: 16px;
    padding: 6px 30px 6px 12px; font-size: 12px; font-family: inherit;
    -webkit-appearance: none; -moz-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'%3E%3Cpath fill='%23aaa' d='M6 8L0 0h12z'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center; background-size: 8px;
    cursor: pointer;
  }
  .topbar-right a { color: #aaa; text-decoration: none; }
  .topbar-right a:hover { color: #fff; }

  /* Layout */
  .shell { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

  /* Welcome */
  .welcome {
    background: linear-gradient(135deg, #111, #2a2a2a);
    color: #fff; border-radius: 14px; padding: 28px 32px;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .welcome::after {
    content: 'POLA'; position: absolute; right: -30px; bottom: -40px;
    font-size: 200px; font-weight: 900; letter-spacing: 20px;
    color: rgba(255,255,255,0.03); pointer-events: none;
  }
  .welcome h1 {
    font-size: 24px; font-weight: 600; margin-bottom: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .welcome .tier-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.12);
    padding: 4px 12px; border-radius: 14px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
  }
  .welcome .greeting { font-size: 13px; color: #aaa; }

  .welcome-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    margin-top: 24px; position: relative; z-index: 1;
  }
  .ws-item .label {
    font-size: 11px; color: #888; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .ws-item .value {
    font-size: 22px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums;
  }
  .ws-item .sub { font-size: 11px; color: #666; margin-top: 2px; }

  /* Tier progress */
  .tier-card {
    background: #fff; border-radius: 12px; padding: 22px 24px;
    margin-bottom: 24px; border: 1px solid #eee;
  }
  .tier-card-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .tier-card h3 {
    font-size: 13px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: #888;
  }
  .tier-card .next-target { font-size: 13px; color: #555; }

  .ladder {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
    margin-bottom: 14px; position: relative;
  }
  .ladder-step {
    padding: 12px 14px; border-radius: 6px; background: #f5f5f5;
    border-left: 3px solid #ddd; font-size: 12px; color: #888;
    transition: all .3s;
  }
  .ladder-step .lab { font-weight: 700; font-size: 14px; color: #555; margin-bottom: 2px; }
  .ladder-step .range { font-size: 11px; }
  .ladder-step.active {
    background: #111; color: #fff; border-left-color: #19884a;
  }
  .ladder-step.active .lab,
  .ladder-step.active .range { color: #fff; }
  .ladder-step.passed { background: #1a1a1a; color: #aaa; }
  .ladder-step.passed .lab { color: #fff; }

  .progress-track {
    background: #f0f0f0; height: 14px; border-radius: 7px;
    overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #111, #444); transition: width .6s ease-out;
  }
  .progress-text {
    display: flex; justify-content: space-between; font-size: 11px;
    color: #888; margin-top: 6px; font-variant-numeric: tabular-nums;
  }
  .progress-cta {
    margin-top: 12px; padding: 12px 16px; background: #fff8e7;
    border-left: 3px solid #d4a017; border-radius: 6px;
    font-size: 13px; color: #6f4d00;
  }
  .progress-cta strong { color: #111; }
  .progress-cta.maxed { background: #e7f7ec; border-left-color: #19884a; color: #105a32; }

  /* Notice */
  .notice {
    background: #fff; border-radius: 12px; padding: 16px 20px;
    margin-bottom: 24px; border: 1px solid #eee;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .notice-icon {
    width: 32px; height: 32px; border-radius: 50%; background: #111;
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .notice-content { font-size: 13px; color: #444; line-height: 1.7; }
  .notice-content strong { color: #111; }
  .notice-content .mono { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 12px; }

  /* Section */
  section { margin-bottom: 28px; }
  .section-title {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title h2 { font-size: 16px; font-weight: 700; }
  .section-title .sub { font-size: 11px; color: #888; }

  /* Orders */
  .orders-list { display: flex; flex-direction: column; gap: 10px; }
  .order-card {
    background: #fff; border: 1px solid #eee; border-radius: 10px;
    padding: 14px 18px; transition: all .15s; cursor: pointer;
  }
  .order-card:hover { border-color: #111; box-shadow: 0 4px 14px rgba(0,0,0,.06); }
  .order-row1 {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .order-meta { display: flex; align-items: center; gap: 10px; }
  .order-meta .num {
    font-family: 'SF Mono', monospace; font-weight: 700; font-size: 13px;
  }
  .order-meta .date { font-size: 11px; color: #888; }
  .order-amount {
    text-align: right;
  }
  .order-amount .retail {
    font-size: 11px; color: #888; text-decoration: line-through;
  }
  .order-amount .agent-cost {
    font-size: 15px; font-weight: 700; color: #111;
    font-variant-numeric: tabular-nums;
  }
  .order-row2 {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: #666;
  }
  .order-customer { font-weight: 600; color: #111; }
  .order-items-sum { font-size: 11px; color: #888; }

  /* Status pill */
  .status {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
  }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status.待確認 { background: #fff4e5; color: #c97c14; }
  .status.已確認 { background: #e7f3ff; color: #1f6fd0; }
  .status.已出貨 { background: #e7f7ec; color: #19884a; }
  .status.已取消 { background: #f3f3f3; color: #888; }

  /* Empty */
  .empty {
    background: #fff; border: 1px dashed #ddd; border-radius: 10px;
    padding: 40px 20px; text-align: center; color: #aaa;
  }

  /* Payable card */
  .payable {
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 18px 22px; margin-bottom: 24px;
  }
  .payable-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; color: #666; padding: 4px 0;
  }
  .payable-row.total {
    font-size: 16px; font-weight: 700; color: #111;
    border-top: 1px solid #eee; margin-top: 8px; padding-top: 12px;
  }
  .payable-row .amount { font-variant-numeric: tabular-nums; }

  /* Drawer */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 100vw;
    background: #fff; z-index: 501; transform: translateX(100%);
    transition: transform .3s cubic-bezier(.32,0,.32,1);
    display: flex; flex-direction: column; box-shadow: -8px 0 30px rgba(0,0,0,.1);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    padding: 18px 24px; border-bottom: 1px solid #eee;
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-header h2 { font-size: 16px; font-weight: 700; }
  .drawer-close {
    background: none; border: none; font-size: 24px; color: #aaa; cursor: pointer; line-height: 1;
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .info-grid {
    display: grid; grid-template-columns: 80px 1fr; gap: 8px 12px;
    font-size: 13px; margin-bottom: 18px;
  }
  .info-grid dt { color: #888; font-size: 11px; text-transform: uppercase; padding-top: 2px; letter-spacing: 1px; }

  .item-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid #f5f5f5; font-size: 13px;
  }
  .item-row:last-child { border: none; }
  .item-row .qty { color: #888; }

  .breakdown {
    background: #fafafa; border-radius: 8px; padding: 14px 16px; margin-top: 14px;
  }
  .breakdown .row {
    display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0;
  }
  .breakdown .row.final {
    font-weight: 700; border-top: 1px solid #ddd; margin-top: 6px; padding-top: 10px;
    font-size: 15px;
  }
  .breakdown .row .label { color: #555; }

  /* Mobile */
  @media (max-width: 700px) {
    .welcome { padding: 22px 20px; }
    .welcome-stats { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .ws-item .value { font-size: 18px; }
    .ladder { grid-template-columns: 1fr; gap: 6px; }
    .topbar { padding: 12px 16px; }
    .topbar-right { font-size: 11px; gap: 8px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="assets/logo.png" alt="POLA" class="logo-img">
    <span class="sub">業務後台</span>
  </div>
  <div class="topbar-right">
    <select id="agentSwitch"></select>
    <a href="index.html">客人目錄</a>
  </div>
</div>

<div class="shell">
  <!-- Welcome card -->
  <div class="welcome">
    <h1>
      <span id="agentName">—</span>
      <span class="tier-pill" id="tierPill">—</span>
    </h1>
    <div class="greeting">Hi！這是你在 POLA 的業務後台 — 2026年5月</div>

    <div class="welcome-stats">
      <div class="ws-item">
        <div class="label">本月業績</div>
        <div class="value mono" id="wsRetail">—</div>
        <div class="sub">原價計算</div>
      </div>
      <div class="ws-item">
        <div class="label">本月訂單</div>
        <div class="value mono" id="wsOrders">—</div>
        <div class="sub">不含取消</div>
      </div>
      <div class="ws-item">
        <div class="label">本月應付</div>
        <div class="value mono" id="wsPayable">—</div>
        <div class="sub">付給公司</div>
      </div>
      <div class="ws-item">
        <div class="label">分潤空間</div>
        <div class="value mono" id="wsMargin">—</div>
        <div class="sub">每萬元原價</div>
      </div>
    </div>
  </div>

  <!-- Tier progress -->
  <div class="tier-card">
    <div class="tier-card-head">
      <h3>業績階段</h3>
      <div class="next-target" id="nextTarget"></div>
    </div>
    <div class="ladder" id="ladder"></div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span>0</span>
      <span class="mono" id="progressNow">—</span>
      <span class="mono" id="progressMax">—</span>
    </div>
    <div class="progress-cta" id="progressCta"></div>
  </div>

  <!-- Notice -->
  <div class="notice">
    <div class="notice-icon">i</div>
    <div class="notice-content">
      <strong>分潤怎麼算？</strong>　業績以「市面原價」累計，下個月 1 號重新分級。<br>
      你跟客人成交多少錢由你決定 — 公司只跟你收「進貨折扣價」。<br>
      <strong>專屬連結：</strong>把 <span class="mono" id="agentLink">—</span> 給客人，他下單就會自動算在你頭上。
    </div>
  </div>

  <!-- Payable summary -->
  <section>
    <div class="section-title">
      <h2>本月應付帳款</h2>
      <span class="sub">月底結算</span>
    </div>
    <div class="payable">
      <div class="payable-row"><span>本月原價總額</span><span class="mono amount" id="payRetail">—</span></div>
      <div class="payable-row"><span>進貨折扣</span><span class="mono amount" id="payDiscount">—</span></div>
      <div class="payable-row total"><span>應付公司</span><span class="mono amount" id="payTotal">—</span></div>
    </div>
  </section>

  <!-- Orders list -->
  <section>
    <div class="section-title">
      <h2>我的客人訂單</h2>
      <span class="sub" id="orderCountSub">—</span>
    </div>
    <div class="orders-list" id="ordersList"></div>
  </section>
</div>

<!-- Order Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <h2 id="drawerTitle">訂單明細</h2>
      <div style="font-size:11px;color:#888;margin-top:2px" id="drawerSub"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script src="mock-data.js"></script>
<script src="agent.js"></script>
</body>
</html>
